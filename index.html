<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>⛏️ Minecraft 2D Battle</title>
    <style>
        /* Basis styling (Minecraft UI look) */
        body { 
            background-color: #313131; 
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }

        #game-container {
            width: 500px;
            background-color: #c6c6c6;
            border: 4px solid #555;
            padding: 20px;
            box-shadow: 10px 10px 0px #000;
            color: #333;
        }

        /* Battle Scene */
        #battle-scene {
            background-color: #70f0ff; /* Lucht */
            border: 4px solid #373737;
            height: 200px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 10px;
            background-image: linear-gradient(to bottom, #70f0ff 70%, #55a040 70%); /* Gras */
        }

        .entity {
            font-size: 80px;
            transition: transform 0.1s, filter 0.1s;
            user-select: none;
        }

        /* HP Balken */
        .hp-container { width: 100%; background: #333; height: 15px; border: 2px solid #000; margin-top: 5px; }
        .hp-bar { height: 100%; background: #ff0000; width: 100%; transition: width 0.3s; }
        .stats { font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; }

        /* De Hotbar (Winkel) */
        .hotbar {
            display: flex;
            justify-content: center;
            gap: 10px;
            background: #8b8b8b;
            padding: 10px;
            border: 3px solid #373737;
            margin-top: 15px;
        }

        .slot {
            width: 60px;
            height: 60px;
            background: #c6c6c6;
            border: 3px solid #373737;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
        }

        .slot:hover { border-color: #fff; background: #ddd; }
        .price { font-size: 10px; font-weight: bold; color: #555; }

        /* Animatie classes */
        .hit { filter: brightness(2) saturate(5) sepia(1) hue-rotate(-50deg); transform: translateX(10px); }
        .attack-anim { transform: translateX(50px) scale(1.1); }

        #log {
            background: #000;
            color: #00ff00;
            height: 60px;
            font-size: 12px;
            padding: 10px;
            margin-top: 10px;
            overflow-y: hidden;
            border: 2px solid #555;
        }

        button#attack-btn {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: #3c8527;
            color: white;
            border: 3px solid #1e4213;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        button#attack-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats">
        <div>XP: <span id="xp-val" style="color: #3c8527;">0</span></div>
        <div>STEVE ❤️</div>
    </div>
    
    <div id="battle-scene">
        🧍</div>
        🧟</div>
    </div>

    <div class="hp-container"><div id="enemy-hp" class="hp-bar"></div></div>
    <div style="text-align:center; font-size: 12px; margin-top: 2px;">MONSTER HP</div>

    <button id="attack-btn" onclick="attack()">SLA DE ZOMBIE! 👊</button>

    <div class="hotbar">
        <div class="slot" onclick="buy('Iron Sword', 50, 10)">🗡️<span class="price">50</span></div>
        <div class="slot" onclick="buy('Diamond Sword', 150, 25)">💎<span class="price">150</span></div>
        <div class="slot" onclick="buy('Golden Apple', 40, 0, 50)">🍎<span class="price">40</span></div>
    </div>

    <div id="log">Welkom in Minecraft Battle! Verzamel XP...</div>
</div>

<script>
    let xp = 0;
    let playerDmg = 5;
    let playerHp = 100;
    let enemyMaxHp = 50;
    let enemyHp = 50;
    let isAttacking = false;

    function attack() {
        if(isAttacking) return;
        isAttacking = true;

        // Player aanval animatie
        const p = document.getElementById('player');
        const e = document.getElementById('enemy');
        p.classList.add('attack-anim');

        setTimeout(() => {
            // Hit effect op de zombie
            e.classList.add('hit');
            enemyHp -= playerDmg;
            updateUI();
            addLog("Jij raakt de zombie voor " + playerDmg + " schade!");

            if(enemyHp <= 0) {
                winBattle();
            }

            setTimeout(() => {
                p.classList.remove('attack-anim');
                e.classList.remove('hit');
                isAttacking = false;
            }, 100);
        }, 100);
    }

    function winBattle() {
        let reward = 25 + Math.floor(Math.random() * 20);
        xp += reward;
        addLog("✨ Verslagen! +" + reward + " XP verdiend!");
        
        // Maak vijand sterker voor de volgende ronde
        enemyMaxHp += 20;
        enemyHp = enemyMaxHp;
        updateUI();
    }

    function buy(name, cost, dmgBonus, heal = 0) {
        if (xp >= cost) {
            xp -= cost;
            playerDmg += dmgBonus;
            addLog("Gekocht: " + name + "!");
            if(heal > 0) addLog("Gezondheid hersteld!");
            updateUI();
        } else {
            addLog("Te weinig XP voor " + name + "!");
        }
    }

    function updateUI() {
        document.getElementById('xp-val').innerText = xp;
        document.getElementById('enemy-hp').style.width = (enemyHp / enemyMaxHp * 100) + "%";
    }

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML = "> " + msg + "<br>" + log.innerHTML;
    }
</script>

</body>
</html>
